version: "3.8"

services:
  cubrid:
    image: cubrid/cubrid:11.2
    ports:
      - "33000:33000"
    environment:
      CUBRID_DB: testdb
    healthcheck:
      test: ["CMD", "csql", "-u", "dba", "testdb", "-c", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      cubrid:
        condition: service_healthy
    environment:
      DATABASE_URL: cubrid+pycubrid://dba@cubrid:33000/testdb
    ports:
      - "5000:5000"
    command: ["flask", "--app", "run.py", "run", "--host=0.0.0.0", "--port=5000"]
