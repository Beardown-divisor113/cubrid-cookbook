version: "3.8"

services:
  cubrid:
    image: cubrid/cubrid:11.2
    ports:
      - "33000:33000"
    environment:
      CUBRID_DB: testdb
    healthcheck:
      test: ["CMD", "csql", "-u", "dba", "testdb", "-c", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      cubrid:
        condition: service_healthy
    environment:
      CUBRID_SQLALCHEMY_URL: cubrid+pycubrid://dba@cubrid:33000/testdb
      CUBRID_HOST: cubrid
      CUBRID_PORT: "33000"
      CUBRID_DB: testdb
      CUBRID_USER: dba
      CUBRID_PASSWORD: ""
    ports:
      - "8000:8000"
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
