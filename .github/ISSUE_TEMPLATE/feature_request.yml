name: Example Request
description: Suggest a new cookbook example
title: "[Example]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Example Description
      description: What example would you like to see?
      placeholder: Describe the example, including the framework/language and use case
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this example solve?
      placeholder: Describe when and why someone would need this example
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the request here
      placeholder: Related examples, documentation links, etc.
    validations:
      required: false
