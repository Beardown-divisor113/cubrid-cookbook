name: Bug Report
description: Report a bug in a cookbook example
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: language
    attributes:
      label: Language/Framework
      description: Which example are you reporting the bug for?
      options:
        - Python — FastAPI
        - Python — Django
        - Python — Flask
        - Python — SQLAlchemy
        - Python — pycubrid
        - Python — Pandas
        - Python — Celery
        - Python — Streamlit
        - Node.js — cubrid-client
        - Node.js — Drizzle ORM
        - Go — cubrid-go
        - Go — GORM
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the bug
      placeholder: What is the bug about?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the bug
      placeholder: |
        1. First step
        2. Second step
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened
      placeholder: What actually happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment
      placeholder: |
        - Language version: Python 3.12 / Node.js 22 / Go 1.22
        - CUBRID version: 11.2
        - Operating System: Linux/macOS/Windows
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the bug here
      placeholder: Code snippets, error messages, logs, etc.
    validations:
      required: false
